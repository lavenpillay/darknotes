// IMPORT / EXPORT
// ═══════════════════════════════════════════════════
function exportWorkspace(){
  const ws = workspaces[currentWsId];
  const nd=Object.values(notes).map(n=>({heading:n.heading,lines:n.lines,labels:n.labels,x:n.x,y:n.y,w:n.w,h:n.h,bgColor:n.bgColor,fontColor:n.fontColor,fontSize:n.fontSize,headingFont:n.headingFont,headingSize:n.headingSize}));
  const cd=Object.values(connections).map(c=>({fromNote:c.fromNote,fromSide:c.fromSide,toNote:c.toNote,toSide:c.toSide}));
  const gd=Object.values(groups).map(g=>({name:g.name,x:g.x,y:g.y,w:g.w,h:g.h,color:g.color}));
  const payload = { name: ws?.name||'Workspace', notes:nd, connections:cd, groups:gd };
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  const safeName=(ws?.name||'workspace').replace(/[^a-z0-9]/gi,'_').toLowerCase();
  a.download='darknotes-'+safeName+'-'+new Date().toISOString().slice(0,10)+'.json'; a.click();
  snack('Exported "'+ws?.name+'" ('+nd.length+' notes)');
}
function openImport(){ document.getElementById('import-overlay').classList.add('visible'); document.getElementById('import-ta').value=''; }
function closeImport(){ document.getElementById('import-overlay').classList.remove('visible'); }
function doImport(){
  try{
    const p = JSON.parse(document.getElementById('import-ta').value.trim());
    // Support both old {notes,connections} format and new {name,notes,connections}
    const importName = p.name || 'Imported Workspace';
    const na = Array.isArray(p) ? p : (p.notes||[]);
    const ca = Array.isArray(p) ? [] : (p.connections||[]);
    const ga = Array.isArray(p) ? [] : (p.groups||[]);
    saveAll();
    const newWsId = createWorkspace(importName);
    localStorage.setItem(wsKey(newWsId,'board'), JSON.stringify({
      notes: na, connections: ca, groups: ga, nextId: 1, nextConnId: 1, nextGroupId: 1
    }));
    saveWorkspaceIndex();
    switchWorkspace(newWsId);
    renderWsDropdown();
    closeImport();
    snack('Imported "'+importName+'" ('+na.length+' notes)');
  }catch(e){ snack('Invalid JSON — check your data'); }
}
function clearAll(){
  if(!Object.keys(notes).length) return;
  if(!confirm('Clear all notes in "'+workspaces[currentWsId]?.name+'"? This cannot be undone.')) return;
  clearBoard();
  saveAll();
}

// ═══════════════════════════════════════════════════
// WORKSPACE UI
// ═══════════════════════════════════════════════════
function renderWsName() {
  const ws = workspaces[currentWsId];
  document.getElementById('ws-name-label').textContent = ws?.name || 'Workspace';
  document.title = 'DarkNotes — ' + (ws?.name||'Notes');
}

function renderWsDropdown() {
  const dd = document.getElementById('ws-dropdown');
  dd.innerHTML = '';
  Object.values(workspaces).sort((a,b)=>a.id-b.id).forEach(ws => {
    const noteCount = countWsNotes(ws.id);
    const item = document.createElement('div');
    item.className = 'ws-item' + (ws.id===currentWsId?' active':'');
    item.innerHTML = `
      <span class="ws-item-name">${escH(ws.name)}</span>
      <span class="ws-item-count">${noteCount} note${noteCount!==1?'s':''}</span>
      <button class="ws-item-del" title="Delete workspace" onclick="event.stopPropagation();deleteWorkspace(${ws.id})">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>`;
    item.addEventListener('click', () => {
      if (ws.id !== currentWsId) switchWorkspace(ws.id);
      renderWsDropdown();
      closeWsDropdown();
    });
    dd.appendChild(item);
  });

  const sep = document.createElement('div');
  sep.className = 'ws-dropdown-sep';
  dd.appendChild(sep);

  // Inline new-workspace form
  const newRow = document.createElement('div');
  newRow.style.cssText = 'padding:8px 14px;display:flex;gap:7px;align-items:center;';
  newRow.innerHTML = `
    <input id="ws-new-input" type="text" placeholder="New workspace name…" maxlength="48"
      style="flex:1;border:1.5px solid var(--border);border-radius:7px;padding:5px 9px;
             font-size:12px;font-family:'DM Sans',sans-serif;color:var(--ink);outline:none;
             transition:border-color 0.15s;"
      onfocus="this.style.borderColor='var(--accent)'"
      onblur="this.style.borderColor='var(--border)'">
    <button onclick="confirmNewWorkspace()" title="Create"
      style="border:none;background:var(--accent);color:white;border-radius:7px;
             width:26px;height:26px;cursor:pointer;display:flex;align-items:center;
             justify-content:center;flex-shrink:0;font-size:18px;line-height:1;
             transition:background 0.15s;"
      onmouseover="this.style.background='#a8431f'" onmouseout="this.style.background='var(--accent)'">+</button>`;
  newRow.addEventListener('click', e => e.stopPropagation());
  dd.appendChild(newRow);

  // Focus the input when dropdown opens
  setTimeout(() => document.getElementById('ws-new-input')?.focus(), 60);
}

function countWsNotes(wsId) {
  if (wsId === currentWsId) return Object.keys(notes).length;
  try {
    const raw = localStorage.getItem(wsKey(wsId,'board'));
    if (!raw) return 0;
    return (JSON.parse(raw).notes||[]).length;
  } catch(e) { return 0; }
}

function toggleWsDropdown() {
  const dd = document.getElementById('ws-dropdown');
  const isOpen = dd.classList.contains('open');
  if (!isOpen) renderWsDropdown();
  dd.classList.toggle('open', !isOpen);
}
function closeWsDropdown() { document.getElementById('ws-dropdown').classList.remove('open'); }

function confirmNewWorkspace() {
  const input = document.getElementById('ws-new-input');
  const name = input?.value.trim();
  if (!name) { input?.focus(); return; }
  saveAll();
  const wsId = createWorkspace(name);
  // Persist an empty board immediately
  localStorage.setItem(wsKey(wsId,'board'), JSON.stringify({notes:[],connections:[],nextId:1,nextConnId:1}));
  switchWorkspace(wsId);
  // Create a starter note on the fresh board
  createNote({ heading: 'New Note', body: '', x: 80, y: 80 });
  saveAll();
  renderWsDropdown();
  snack('Workspace "' + name + '" created');
}

function openWsSettings() {
  closeWsDropdown();
  const ws = workspaces[currentWsId];
  document.getElementById('ws-name-input').value = ws?.name || '';
  document.getElementById('ws-settings-overlay').classList.add('open');
  setTimeout(()=>document.getElementById('ws-name-input').focus(),50);
}
function closeWsSettings() { document.getElementById('ws-settings-overlay').classList.remove('open'); }
function saveWsSettings() {
  const newName = document.getElementById('ws-name-input').value.trim();
  if (!newName) return;
  workspaces[currentWsId].name = newName;
  saveWorkspaceIndex();
  renderWsName();
  closeWsSettings();
  snack('Workspace renamed to "'+newName+'"');
}
document.getElementById('ws-dropdown').addEventListener('keydown', e => {
  if (e.target.id === 'ws-new-input' && e.key === 'Enter') {
    e.preventDefault();
    confirmNewWorkspace();
  }
  if (e.key === 'Escape') closeWsDropdown();
});
document.getElementById('ws-name-input').addEventListener('keydown', e => {
  if (e.key==='Enter') saveWsSettings();
  if (e.key==='Escape') closeWsSettings();
});

// ═══════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════
function closeAllPanels(){
  document.querySelectorAll('[data-color-panel]').forEach(p=>p.classList.remove('open'));
  document.querySelectorAll('[data-settings-panel]').forEach(p=>p.classList.remove('open'));
}
function snack(msg){const s=document.getElementById('snackbar');s.textContent=msg;s.classList.add('show');setTimeout(()=>s.classList.remove('show'),3000);}

// ═══════════════════════════════════════════════════
// MINIMAP
// ═══════════════════════════════════════════════════
const BOARD_W = 4000, BOARD_H = 3000;
const mmWrap = document.getElementById('minimap-wrap');
const mmEl   = document.getElementById('minimap');
const mmCvs  = document.getElementById('minimap-canvas');
const mmVp   = document.getElementById('minimap-viewport');
const mmCtx  = mmCvs.getContext('2d');

let mmCollapsed = false;
let mmAnimFrame = null;

function mmScale() {
  // scale factors: board → minimap pixel
  return { sx: mmEl.offsetWidth / BOARD_W, sy: mmEl.offsetHeight / BOARD_H };
}

function renderMinimap() {
  if (mmCollapsed) return;
  const mw = mmEl.offsetWidth, mh = mmEl.offsetHeight;
  if (mw < 10 || mh < 10) return; // guard against collapsed/transitioning state

  try {
    mmCvs.width  = mw;
    mmCvs.height = mh;

  const { sx, sy } = mmScale();
  const ctx = mmCtx;
  ctx.clearRect(0, 0, mw, mh);

  // Draw groups (behind everything)
  Object.values(groups).forEach(g => {
    const x = g.x*sx, y = g.y*sy, w = Math.max(1,g.w*sx), h = Math.max(1,g.h*sy);
    const r = Math.min(4, w/2, h/2);
    ctx.beginPath();
    ctx.moveTo(x+r, y);
    ctx.lineTo(x+w-r, y); ctx.arcTo(x+w,y, x+w,y+r, r);
    ctx.lineTo(x+w, y+h-r); ctx.arcTo(x+w,y+h, x+w-r,y+h, r);
    ctx.lineTo(x+r, y+h); ctx.arcTo(x,y+h, x,y+h-r, r);
    ctx.lineTo(x, y+r); ctx.arcTo(x,y, x+r,y, r);
    ctx.closePath();
    ctx.fillStyle = g.color || 'rgba(200,200,200,0.35)';
    ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.12)';
    ctx.lineWidth = 0.8;
    ctx.stroke();
  });

  // Draw connection lines
  ctx.save();
  ctx.strokeStyle = 'rgba(176,152,120,0.55)';
  ctx.lineWidth = 1;
  Object.values(connections).forEach(c => {
    const fn = notes[c.fromNote], tn = notes[c.toNote];
    if (!fn || !tn) return;
    const p1 = connPointPos(fn, c.fromSide);
    const p2 = connPointPos(tn, c.toSide);
    const d = Math.max(20, Math.hypot(p2.x-p1.x, p2.y-p1.y)*0.45);
    const offsets = { top:{x:0,y:-1}, right:{x:1,y:0}, bottom:{x:0,y:1}, left:{x:-1,y:0} };
    const o1 = offsets[c.fromSide]||{x:0,y:0};
    const o2 = offsets[c.toSide]  ||{x:0,y:0};
    ctx.beginPath();
    ctx.moveTo(p1.x*sx, p1.y*sy);
    ctx.bezierCurveTo(
      (p1.x+o1.x*d)*sx, (p1.y+o1.y*d)*sy,
      (p2.x+o2.x*d)*sx, (p2.y+o2.y*d)*sy,
      p2.x*sx, p2.y*sy
    );
    ctx.stroke();
  });
  ctx.restore();

  // Draw notes
  Object.values(notes).forEach(n => {
    const x = n.x*sx, y = n.y*sy;
    const w = Math.max(1, n.w*sx), h = Math.max(1, (n.h||220)*sy);
    const r = Math.min(3, w/2, h/2); // clamp radius so it never exceeds half dimension

    function roundedRect(cx, cy, cw, ch, cr) {
      ctx.beginPath();
      ctx.moveTo(cx+cr, cy);
      ctx.lineTo(cx+cw-cr, cy);
      ctx.arcTo(cx+cw, cy,    cx+cw, cy+cr,    cr);
      ctx.lineTo(cx+cw, cy+ch-cr);
      ctx.arcTo(cx+cw, cy+ch, cx+cw-cr, cy+ch, cr);
      ctx.lineTo(cx+cr, cy+ch);
      ctx.arcTo(cx, cy+ch, cx, cy+ch-cr, cr);
      ctx.lineTo(cx, cy+cr);
      ctx.arcTo(cx, cy,    cx+cr, cy,    cr);
      ctx.closePath();
    }

    // Fill with shadow
    ctx.save();
    ctx.shadowColor = 'rgba(26,22,18,0.15)';
    ctx.shadowBlur = 4;
    ctx.shadowOffsetX = 1; ctx.shadowOffsetY = 2;
    roundedRect(x, y, w, h, r);
    ctx.fillStyle = n.bgColor || '#fff9c4';
    ctx.fill();
    ctx.restore();

    // Border
    roundedRect(x, y, w, h, r);
    ctx.strokeStyle = 'rgba(26,22,18,0.1)';
    ctx.lineWidth = 0.5;
    ctx.stroke();

    // Heading hint line
    if (w > 6 && h > 5) {
      ctx.fillStyle = n.fontColor || '#1a1612';
      ctx.globalAlpha = 0.5;
      const lineW = Math.min(w-4, (n.heading?.length||6) * 0.7 * sx * 14);
      if (lineW > 0) ctx.fillRect(x+2, y+2.5, lineW, 1.5);
      ctx.globalAlpha = 1;
    }
  });

  // Viewport indicator
  const canvasRect = canvas.getBoundingClientRect();
  const vpW = canvasRect.width, vpH = canvasRect.height;

  // Viewport on board coords: top-left corner of the visible area
  const vpBoardX = -boardOffsetX;
  const vpBoardY = -boardOffsetY;

  const vpLeft   = vpBoardX * sx;
  const vpTop    = vpBoardY * sy;
  const vpRight  = vpLeft + vpW * sx;
  const vpBottom = vpTop  + vpH * sy;

  // Clamp display but keep proportions readable
  const vpDispLeft   = Math.max(0, Math.min(vpLeft,   mw - 10));
  const vpDispTop    = Math.max(0, Math.min(vpTop,    mh - 10));
  const vpDispRight  = Math.max(vpDispLeft+10, Math.min(vpRight,  mw));
  const vpDispBottom = Math.max(vpDispTop+10,  Math.min(vpBottom, mh));

  mmVp.style.left   = vpDispLeft   + 'px';
  mmVp.style.top    = vpDispTop    + 'px';
  mmVp.style.width  = (vpDispRight  - vpDispLeft) + 'px';
  mmVp.style.height = (vpDispBottom - vpDispTop)  + 'px';
  } catch(e) { /* suppress mid-transition render errors */ }
}

// Throttle redraws to rAF
function scheduleMmRender() {
  if (mmAnimFrame) return;
  mmAnimFrame = requestAnimationFrame(() => {
    mmAnimFrame = null;
    renderMinimap();
  });
}

// Minimap viewport drag
let mmDragging = false, mmDragStartX, mmDragStartY, mmDragOrigBX, mmDragOrigBY;

mmVp.addEventListener('mousedown', e => {
  e.preventDefault(); e.stopPropagation();
  mmDragging = true;
  mmDragStartX = e.clientX; mmDragStartY = e.clientY;
  mmDragOrigBX = boardOffsetX; mmDragOrigBY = boardOffsetY;
  mmVp.classList.add('dragging');
});

document.addEventListener('mousemove', e => {
  if (!mmDragging) return;
  const { sx, sy } = mmScale();
  const dx = (e.clientX - mmDragStartX) / sx;
  const dy = (e.clientY - mmDragStartY) / sy;
  boardOffsetX = mmDragOrigBX - dx;
  boardOffsetY = mmDragOrigBY - dy;
  applyBoardTransform();
  scheduleMmRender();
});

document.addEventListener('mouseup', () => {
  if (mmDragging) { mmDragging = false; mmVp.classList.remove('dragging'); scheduleMmRender(); }
});

// Click on minimap background to jump view
mmEl.addEventListener('mousedown', e => {
  if (e.target === mmVp) return;
  e.preventDefault();
  const rect = mmEl.getBoundingClientRect();
  const { sx, sy } = mmScale();
  const clickBX = (e.clientX - rect.left) / sx;
  const clickBY = (e.clientY - rect.top)  / sy;
  const canvasRect = canvas.getBoundingClientRect();
  boardOffsetX = -(clickBX - canvasRect.width  / 2);
  boardOffsetY = -(clickBY - canvasRect.height / 2);
  applyBoardTransform();
  scheduleMmRender();
  saveAll();
});

function toggleMinimap() {
  mmCollapsed = !mmCollapsed;
  mmWrap.classList.toggle('collapsed', mmCollapsed);
  mmEl.classList.toggle('collapsed', mmCollapsed);
  if (!mmCollapsed) {
    // Wait for the CSS height transition to finish (~220ms) before rendering
    setTimeout(scheduleMmRender, 240);
  }
}

// Toggle button stops propagation so it doesn't also trigger the bar click
document.getElementById('minimap-toggle').addEventListener('click', e => {
  e.stopPropagation();
  toggleMinimap();
});

// Clicking the bar only expands (when collapsed) — clicking the button handles both directions
document.getElementById('minimap-bar').addEventListener('click', () => {
  if (mmCollapsed) toggleMinimap();
});

// Initial render after everything loads (done in INIT section)

// ═══════════════════════════════════════════════════
// ZOOM
// ═══════════════════════════════════════════════════
const ZOOM_MIN = 0.25, ZOOM_MAX = 3, ZOOM_STEP = 0.1;

function updateZoomLabel() {
  const el = document.getElementById('zoom-label');
  if (el) el.textContent = Math.round(boardZoom * 100) + '%';
}

function zoomTo(newZoom, pivotX, pivotY) {
  // pivotX/Y are canvas-relative coords (screen pixels) to zoom towards
  newZoom = Math.min(ZOOM_MAX, Math.max(ZOOM_MIN, newZoom));
  const ratio = newZoom / boardZoom;
  // Adjust offset so the pivot point stays fixed on screen
  if (pivotX !== undefined && pivotY !== undefined) {
    boardOffsetX = pivotX - ratio * (pivotX - boardOffsetX);
    boardOffsetY = pivotY - ratio * (pivotY - boardOffsetY);
  } else {
    // Zoom towards canvas centre
    const r = canvas.getBoundingClientRect();
    const cx = r.width / 2, cy = r.height / 2;
    boardOffsetX = cx - ratio * (cx - boardOffsetX);
    boardOffsetY = cy - ratio * (cy - boardOffsetY);
  }
  boardZoom = newZoom;
  applyBoardTransform();
  scheduleMmRender();
}

function zoomBy(delta) { zoomTo(boardZoom + delta); saveAll(); }
function zoomReset()   { zoomTo(1); saveAll(); }

// Ctrl+Wheel to zoom, plain wheel to pan
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  if (e.ctrlKey || e.metaKey) {
    const r = canvas.getBoundingClientRect();
    const px = e.clientX - r.left;
    const py = e.clientY - r.top;
    const delta = e.deltaY < 0 ? ZOOM_STEP : -ZOOM_STEP;
    zoomTo(boardZoom + delta, px, py);
    saveAll();
  } else {
    // Pan with plain scroll
    boardOffsetX -= e.deltaX;
    boardOffsetY -= e.deltaY;
    applyBoardTransform();
    scheduleMmRender();
    saveAll();
  }
}, { passive: false });

// ═══════════════════════════════════════════════════
// CANVAS PANNING
// ═══════════════════════════════════════════════════
document.addEventListener('keydown',e=>{
  if(e.code==='Space'&&e.target===document.body){e.preventDefault();spaceDown=true;canvas.style.cursor='grab';}
  if((e.ctrlKey||e.metaKey)&&(e.key==='='||e.key==='+')){e.preventDefault();zoomBy(ZOOM_STEP);saveAll();}
  if((e.ctrlKey||e.metaKey)&&e.key==='-'){e.preventDefault();zoomBy(-ZOOM_STEP);saveAll();}
  if((e.ctrlKey||e.metaKey)&&e.key==='0'){e.preventDefault();zoomReset();}
});
document.addEventListener('keyup',e=>{if(e.code==='Space'){spaceDown=false;canvas.style.cursor='';}});
canvas.addEventListener('mousedown',e=>{
  if(e.target!==canvas&&e.target!==board&&!spaceDown) return;
  if(e.button===1||(e.button===0&&spaceDown)){
    isPanning=true;
    panStartX=e.clientX-boardOffsetX;
    panStartY=e.clientY-boardOffsetY;
    canvas.classList.add('panning');e.preventDefault();
  }
});
document.addEventListener('mousemove',e=>{
  if(!isPanning) return;
  boardOffsetX=e.clientX-panStartX; boardOffsetY=e.clientY-panStartY;
  applyBoardTransform();
  scheduleMmRender();
});
document.addEventListener('mouseup',()=>{isPanning=false;canvas.classList.remove('panning');});
document.addEventListener('click',e=>{
  if(!e.target.closest('#ctx-panel')) hideCtx();
  if(!e.target.closest('[data-palette-btn]')&&!e.target.closest('[data-color-panel]')
    &&!e.target.closest('[data-settings-btn]')&&!e.target.closest('[data-settings-panel]'))
    closeAllPanels();
  if(!e.target.closest('[data-group-color-btn]')&&!e.target.closest('[data-group-color-panel]'))
    document.querySelectorAll('[data-group-color-panel]').forEach(p=>p.classList.remove('open'));
  if(!e.target.closest('#ws-switcher')) closeWsDropdown();
});
document.addEventListener('contextmenu',e=>{if(!e.target.closest('.note')) hideCtx();});

// Save board pan position when panning stops
document.addEventListener('mouseup', () => { if(currentWsId) saveAll(); });

// ═══════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════
loadAll();
updateZoomLabel();
if(Object.keys(notes).length===0 && Object.keys(workspaces).length===1){
  const n1=createNote({
    heading:'Welcome to DarkNotes!',
    body:'Drag notes around, resize from the corner, change colors and font size.\n\nHover a note edge — orange dots appear. Drag from a dot to another note\'s dot to draw a connection line.\n\nClick any connection line to delete it.\n\nUse the workspace switcher (top left) to create multiple boards.',
    labels:['welcome','tips'], x:60, y:60, bgColor:'#FFF9C4', fontColor:'#1a1612', fontSize:14
  });
  const n2=createNote({
    heading:'Connected note',
    body:'I\'m linked to the note on the left!\n\nTry dragging me around — the line follows.',
    labels:['example'], x:450, y:90, bgColor:'#E3F2FD', fontColor:'#1a1612', fontSize:14
  });
  setTimeout(()=>{addConnection(n1.id,'right',n2.id,'left');saveAll();scheduleMmRender();},120);
}
// Initial minimap render after DOM settles
setTimeout(scheduleMmRender, 200);
// Re-render on window resize
window.addEventListener('resize', scheduleMmRender);
</script>
